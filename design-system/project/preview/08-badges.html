<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; font-family: 'Inter', sans-serif; padding: 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
.group { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.badge { display: inline-flex; align-items: center; border-radius: 4px; padding: 3px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
</style></head><body>

<div class="group">
  <div class="lbl">Category</div>
  <span class="badge" style="background:rgba(229,9,20,0.85);color:#fff">Country House</span>
</div>
<div class="group">
  <div class="lbl">NEW</div>
  <span class="badge" style="background:#E50914;color:#fff">NEW</span>
</div>
<div class="group">
  <div class="lbl">Maturity</div>
  <span class="badge" style="background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.4);font-weight:500">TV-MA</span>
</div>
<div class="group">
  <div class="lbl">Solved</div>
  <span class="badge" style="background:rgba(76,221,138,0.12);color:#4cdd8a;border:1px solid rgba(76,221,138,0.25)">✓ SOLVED</span>
</div>
<div class="group">
  <div class="lbl">Failed</div>
  <span class="badge" style="background:rgba(229,9,20,0.12);color:#E50914;border:1px solid rgba(229,9,20,0.25)">✗ FAILED</span>
</div>
<div class="group">
  <div class="lbl">Ghost Pill</div>
  <span class="badge" style="background:rgba(255,255,255,0.06);color:#aaaaaa;border:1px solid rgba(255,255,255,0.1)">Evidence</span>
</div>
<div class="group">
  <div class="lbl">Critical</div>
  <span class="badge" style="background:rgba(229,9,20,0.08);color:#E50914;border:1px solid rgba(229,9,20,0.25)">Critical</span>
</div>
<div class="group">
  <div class="lbl">Key Event</div>
  <span class="badge" style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4)">Key Event</span>
</div>
<div class="group">
  <div class="lbl">High Risk</div>
  <span class="badge" style="background:rgba(10,5,10,0.7);color:#E50914;border:1px solid rgba(229,9,20,0.5);backdrop-filter:blur(8px)">High Risk</span>
</div>
<div class="group">
  <div class="lbl">Match %</div>
  <span style="color:#4cdd8a;font-size:13px;font-weight:700">97% Match</span>
</div>

</body></html>
