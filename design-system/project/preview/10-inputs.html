<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; font-family: 'Inter', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 6px; }
input, textarea { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; padding: 12px 16px; width: 100%; outline: none; }
input::placeholder, textarea::placeholder { color: #444; }
.focus { border-color: rgba(229,9,20,0.5) !important; box-shadow: 0 0 0 3px rgba(229,9,20,0.08); }
textarea { height: 80px; resize: none; line-height: 1.65; }
</style></head><body>

<div>
  <div class="lbl">Text Input · Default</div>
  <input placeholder="Search cases...">
</div>
<div>
  <div class="lbl">Text Input · Focus</div>
  <input class="focus" value="The Thornwood Affair" placeholder="">
</div>
<div>
  <div class="lbl">Textarea · Notes</div>
  <textarea placeholder="Record your observations, suspicions, and theories here."></textarea>
</div>

</body></html>
