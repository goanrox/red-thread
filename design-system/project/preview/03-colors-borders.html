<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; font-family: 'Inter', sans-serif; padding: 24px; }
.row { display: flex; gap: 10px; }
.item { flex: 1; background: #1a1a1a; border-radius: 4px; padding: 16px 12px; }
.label { font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
.value { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); }
.preview { height: 3px; border-radius: 2px; margin-bottom: 8px; }
</style></head><body>
<div class="row">
  <div class="item" style="border: 1px solid rgba(255,255,255,0.06);">
    <div class="preview" style="background:rgba(255,255,255,0.06);"></div>
    <div class="label">Border Subtle</div><div class="value">rgba(255,255,255,.06)</div>
  </div>
  <div class="item" style="border: 1px solid rgba(255,255,255,0.10);">
    <div class="preview" style="background:rgba(255,255,255,0.10);"></div>
    <div class="label">Border Base</div><div class="value">rgba(255,255,255,.10)</div>
  </div>
  <div class="item" style="border: 1px solid rgba(255,255,255,0.18);">
    <div class="preview" style="background:rgba(255,255,255,0.18);"></div>
    <div class="label">Border Hover</div><div class="value">rgba(255,255,255,.18)</div>
  </div>
  <div class="item" style="border: 1px solid rgba(229,9,20,0.30);">
    <div class="preview" style="background:rgba(229,9,20,0.30);"></div>
    <div class="label">Border Red</div><div class="value">rgba(229,9,20,.30)</div>
  </div>
  <div class="item" style="border: 1px dashed rgba(255,255,255,0.10);">
    <div class="preview" style="background:rgba(255,255,255,0.10);"></div>
    <div class="label">Border Dashed</div><div class="value">dashed .10</div>
  </div>
</div>
</body></html>
