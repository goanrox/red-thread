<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; font-family: 'Inter', sans-serif; padding: 24px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; border-radius: 4px; padding: 14px 12px; }
.label { font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
.value { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); font-family: 'Inter', monospace; }
</style></head><body>
<div class="row">
  <div class="swatch" style="background:#141414; border: 1px solid rgba(255,255,255,0.12);">
    <div class="label">BG Primary</div><div class="value">#141414</div>
  </div>
  <div class="swatch" style="background:#1a1a1a; border: 1px solid rgba(255,255,255,0.08);">
    <div class="label">BG Card</div><div class="value">#1a1a1a</div>
  </div>
  <div class="swatch" style="background:#222222; border: 1px solid rgba(255,255,255,0.08);">
    <div class="label">BG Elevated</div><div class="value">#222222</div>
  </div>
  <div class="swatch" style="background:#2a2a2a; border: 1px solid rgba(255,255,255,0.08);">
    <div class="label">BG Hover</div><div class="value">#2a2a2a</div>
  </div>
  <div class="swatch" style="background:rgba(20,20,20,0.97); border: 1px solid rgba(255,255,255,0.08);">
    <div class="label">BG Nav</div><div class="value">rgba(20,20,20,.97)</div>
  </div>
</div>
</body></html>
