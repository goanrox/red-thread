<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141414; font-family: 'Inter', sans-serif; padding: 24px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
.group { display: flex; flex-direction: column; gap: 8px; }
.lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; width: 160px; }
.fill { height: 100%; border-radius: 99px; }
.radius-demo { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #666; font-weight: 700; letter-spacing: 0.2em; }
.spacer { display: flex; align-items: center; gap: 8px; }
.spacer-line { background: rgba(229,9,20,0.4); height: 14px; width: 3px; border-radius: 1px; }
.spacer-val { font-size: 10px; font-weight: 600; color: #666; }
</style></head><body>

<div class="group">
  <div class="lbl">Progress · Red</div>
  <div class="track"><div class="fill" style="width:65%;background:#E50914"></div></div>
  <div class="lbl">Progress · Suspicion</div>
  <div class="track"><div class="fill" style="width:85%;background:#E50914;box-shadow:0 0 8px rgba(229,9,20,0.4)"></div></div>
  <div class="lbl">Progress · Low</div>
  <div class="track"><div class="fill" style="width:20%;background:#666"></div></div>
</div>

<div class="group">
  <div class="lbl">Border Radius · ALL elements</div>
  <div class="radius-demo" style="border-radius:4px;width:80px;height:36px">4px</div>
  <div class="lbl">Avatars / Pills</div>
  <div class="radius-demo" style="border-radius:9999px;width:36px;height:36px">∞</div>
</div>

<div class="group">
  <div class="lbl">Spacing Tokens</div>
  <div class="spacer"><div class="spacer-line" style="height:6px"></div><span class="spacer-val">6px · card-gap</span></div>
  <div class="spacer"><div class="spacer-line" style="height:16px"></div><span class="spacer-val">16px · grid-gap</span></div>
  <div class="spacer"><div class="spacer-line" style="height:24px"></div><span class="spacer-val">24px · card-pad-lg</span></div>
  <div class="spacer"><div class="spacer-line" style="height:36px"></div><span class="spacer-val">68px · nav-height</span></div>
</div>

<div class="group">
  <div class="lbl">Shadows</div>
  <div style="background:#1a1a1a;border-radius:4px;padding:12px 16px;border:1px solid rgba(255,255,255,0.07);box-shadow:0 4px 20px rgba(0,0,0,0.5);font-size:10px;color:#666;width:130px">Card shadow</div>
  <div style="background:#1a1a1a;border-radius:4px;padding:12px 16px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 16px 48px rgba(0,0,0,0.8);font-size:10px;color:#666;width:130px">Hover shadow</div>
</div>

</body></html>
